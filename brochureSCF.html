    <script>
        $(window).ready(function() {
            var flipbook = $('.flipbook');
            var sound = document.getElementById("audioFlip");

            // Esto soluciona el bloqueo de sonido de Chrome/Brave
            $(document).one('click', function() {
                sound.play().then(() => {
                    sound.pause();
                    sound.currentTime = 0;
                }).catch(e => console.log("Audio esperando clic"));
            });

            flipbook.turn({
                width: 1332,
                height: 500,
                autoCenter: true,
                display: 'double',
                acceleration: true,
                gradients: true,
                elevation: 250,
                duration: 1200,
                when: {
                    turning: function(event, page, view) {
                        if (sound) {
                            sound.pause();
                            sound.currentTime = 0;
                            sound.play().catch(e => {});
                        }
                    }
                }
            });
        });

        $(document).keydown(function(e) {
            if (e.keyCode == 37) $(".flipbook").turn("previous");
            if (e.keyCode == 39) $(".flipbook").turn("next");
        });
    </script>
