<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="jquery.js"></script>
    <script src="turn.js"></script>
    <style>
        body { 
            background: #111; 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        /* El contenedor ahora es flexible */
        .flipbook-viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        .flipbook img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Evita que la imagen se deforme */
        }
    </style>
</head>
<body>

    <audio id="audioFlip" src="images/página-flip.mp3" preload="auto"></audio>

    <div class="flipbook-viewport">
        <div class="flipbook">
            <!-- Tus 54 imágenes aquí -->
            <div><img src="images/pagina1.jpg"></div>
            <!-- ... resto de páginas ... -->
            <div><img src="images/pagina54.jpg"></div>
        </div>
    </div>

    <script>
        $(window).ready(function() {
            var flipbook = $('.flipbook');
            var sound = document.getElementById("audioFlip");

            // Función para determinar el tamaño según la pantalla
            function getDimensions() {
                var width = $(window).width();
                var height = $(window).height();
                
                if (width < 600) { // Modo Celular
                    return {
                        width: width * 0.9,
                        height: height * 0.7,
                        display: 'single'
                    };
                } else { // Modo PC
                    return {
                        width: 1332,
                        height: 500,
                        display: 'double'
                    };
                }
            }

            var config = getDimensions();

            // Desbloqueo de sonido
            $(document).one('click', function() {
                sound.play().then(() => {
                    sound.pause();
                    sound.currentTime = 0;
                }).catch(e => {});
            });

            // Inicialización dinámica
            flipbook.turn({
                width: config.width,
                height: config.height,
                display: config.display,
                autoCenter: true,
                acceleration: true,
                gradients: true,
                elevation: 50,
                duration: 1000,
                when: {
                    turning: function(event, page, view) {
                        if (sound) {
                            sound.pause();
                            sound.currentTime = 0;
                            sound.play().catch(e => {});
                        }
                    }
                }
            });
        });

        // Controles de teclado
        $(document).keydown(function(e) {
            if (e.keyCode == 37) $(".flipbook").turn("previous");
            if (e.keyCode == 39) $(".flipbook").turn("next");
        });
    </script>
</body>
</html>
