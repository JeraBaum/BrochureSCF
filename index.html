        /* Contenedor de la página */
        .flipbook .page {

        }

        /* Ajuste de la imagen para que NO se estire */
        .flipbook img {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain; /* Mantiene la proporción original sin estirar */

    <script>
        $(window).ready(function() {
            var flipbook = $('.flipbook');
            var sound = document.getElementById("audioFlip");

            function loadFlipbook() {
                var w = $(window).width();
                var h = $(window).height();
                
                var finalW, finalH, displayMode;

                // Cálculo de dimensiones responsivas
                if (w < 600) { 
                    // Celular: Modo una sola hoja
                    finalW = w * 0.98;
                    finalH = h * 0.85;
                    displayMode = 'single';
                } else { 
                    // PC: Modo doble hoja
                    // Mantenemos una proporción balanceada para evitar cortes
                    finalW = Math.min(w * 0.9, 1200); 
                    finalH = Math.min(h * 0.9, 600);
                    displayMode = 'double';
                }

                if (flipbook.turn('is')) {
                    flipbook.turn('size', finalW, finalH);
                    flipbook.turn('display', displayMode);
                } else {
                    flipbook.turn({
                        width: finalW,
                        height: finalH,
                        display: displayMode,
                        autoCenter: true,
                        acceleration: true,
                        gradients: true,
                        elevation: 50,
                        duration: 800,
                        when: {
                            turning: function(event, page, view) {
                                if (sound) {
                                    sound.pause();
                                    sound.currentTime = 0;
                                    sound.play().catch(e => {});
                                }
                            }
                        }
                    });
                }
            }

            loadFlipbook();

            // Ajuste automático si se gira el dispositivo
            $(window).bind('resize', function() {
                loadFlipbook();
            });

            // Interacción para activar audio (Requerido por navegadores)
            $(document).one('touchstart click', function() {
                if (sound) {
                    sound.play().then(() => {
                        sound.pause();
                        sound.currentTime = 0;
                    }).catch(e => {});
                }
            });
        });

        // Navegación con flechas
        $(document).keydown(function(e) {
            if (e.keyCode == 37) $(".flipbook").turn("previous");
            if (e.keyCode == 39) $(".flipbook").turn("next");
        });
    </script>
